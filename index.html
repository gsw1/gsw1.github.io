<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="随机食物生成器，帮你决定今天吃什么">
    <title>今天吃什么？</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">今天吃什么？</h1>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
            <button class="random-button" onclick="randomFood()">今天吃什么</button>
            <a href="animation.html" class="heart-link" title="动画">❤️</a>
        </div>
        <style>
            .heart-link {
                font-size: 28px;
                text-decoration: none;
                animation: heartbeat 1s ease-in-out infinite;
                display: inline-block;
            }
            @keyframes heartbeat {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.3); }
            }
        </style>
        
        <div class="result-card">
            <h2 class="food-label">点击按钮开始随机</h2>
            <p class="sentence-label"></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
