<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D爱心粒子效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 25);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // 爱心粒子系统
        const heartParticleCount = 6000;
        const heartGeometry = new THREE.BufferGeometry();
        const heartPositions = new Float32Array(heartParticleCount * 3);
        const heartOriginalPositions = new Float32Array(heartParticleCount * 3);
        const heartColors = new Float32Array(heartParticleCount * 3);
        const heartPhases = new Float32Array(heartParticleCount);

        // 生成爱心形状
        function generateHeartPoint(u, v, scale) {
            // 2D爱心参数方程
            const x = 16 * Math.pow(Math.sin(u), 3);
            const y = 13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u);
            
            // 添加深度维度，使爱心饱满
            const depth = Math.sin(v) * 3;
            const z = depth * Math.cos(u);
            
            return {
                x: x * scale * 0.15,
                y: y * scale * 0.15,
                z: z * scale * 0.15
            };
        }

        // 生成爱心粒子
        for (let i = 0; i < heartParticleCount; i++) {
            const idx = i * 3;
            
            // 使用黄金角度分布
            const phi = Math.acos(1 - 2 * (i + 0.5) / heartParticleCount);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            
            // 生成多层爱心
            const layer = Math.floor(Math.random() * 3); // 3层
            const scale = 0.8 + layer * 0.15;
            
            const u = theta % (Math.PI * 2);
            const v = phi;
            
            const pos = generateHeartPoint(u, v, scale);
            
            // 添加微小随机偏移
            pos.x += (Math.random() - 0.5) * 0.3;
            pos.y += (Math.random() - 0.5) * 0.3;
            pos.z += (Math.random() - 0.5) * 0.3;
            
            heartPositions[idx] = pos.x;
            heartPositions[idx + 1] = pos.y;
            heartPositions[idx + 2] = pos.z;
            
            heartOriginalPositions[idx] = pos.x;
            heartOriginalPositions[idx + 1] = pos.y;
            heartOriginalPositions[idx + 2] = pos.z;
            
            // 每个粒子的相位，用于动画
            heartPhases[i] = Math.random() * Math.PI * 2;
            
            // 根据位置和层级设置颜色
            const normalizedY = (pos.y + 10) / 20;
            const depthFactor = (pos.z + 3) / 6;
            
            if (layer === 0) {
                // 外层 - 亮粉色
                heartColors[idx] = 1.0;
                heartColors[idx + 1] = 0.3 + depthFactor * 0.3;
                heartColors[idx + 2] = 0.6 + depthFactor * 0.2;
            } else if (layer === 1) {
                // 中层 - 中粉色
                heartColors[idx] = 1.0;
                heartColors[idx + 1] = 0.2 + depthFactor * 0.2;
                heartColors[idx + 2] = 0.5 + depthFactor * 0.2;
            } else {
                // 内层 - 深粉色
                heartColors[idx] = 0.9 + Math.random() * 0.1;
                heartColors[idx + 1] = 0.1 + depthFactor * 0.2;
                heartColors[idx + 2] = 0.4 + depthFactor * 0.2;
            }
        }

        heartGeometry.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
        heartGeometry.setAttribute('color', new THREE.BufferAttribute(heartColors, 3));

        // 创建圆形纹理
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.4, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 32, 32);
        const particleTexture = new THREE.CanvasTexture(canvas);

        const heartMaterial = new THREE.PointsMaterial({
            size: 0.5,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.9,
            map: particleTexture
        });

        const heartParticles = new THREE.Points(heartGeometry, heartMaterial);
        scene.add(heartParticles);

        // 流动粒子系统 - 从外部飞向爱心
        const flowParticleCount = 1500;
        const flowGeometry = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowParticleCount * 3);
        const flowTargets = new Float32Array(flowParticleCount * 3);
        const flowProgress = new Float32Array(flowParticleCount);
        const flowSpeeds = new Float32Array(flowParticleCount);
        const flowColors = new Float32Array(flowParticleCount * 3);

        function getRandomHeartPoint() {
            const u = Math.random() * Math.PI * 2;
            const v = Math.acos(2 * Math.random() - 1);
            const scale = 0.8 + Math.random() * 0.3;
            return generateHeartPoint(u, v, scale);
        }

        for (let i = 0; i < flowParticleCount; i++) {
            const idx = i * 3;
            
            // 随机起始位置（在爱心外部）
            const angle = Math.random() * Math.PI * 2;
            const radius = 15 + Math.random() * 10;
            const height = (Math.random() - 0.5) * 20;
            
            flowPositions[idx] = Math.cos(angle) * radius;
            flowPositions[idx + 1] = height;
            flowPositions[idx + 2] = Math.sin(angle) * radius;
            
            // 目标位置（爱心表面）
            const target = getRandomHeartPoint();
            flowTargets[idx] = target.x;
            flowTargets[idx + 1] = target.y;
            flowTargets[idx + 2] = target.z;
            
            // 进度和速度
            flowProgress[i] = Math.random();
            flowSpeeds[i] = 0.005 + Math.random() * 0.01;
            
            // 颜色 - 淡粉色/白色
            const brightness = 0.7 + Math.random() * 0.3;
            flowColors[idx] = brightness;
            flowColors[idx + 1] = brightness * 0.7;
            flowColors[idx + 2] = brightness * 0.9;
        }

        flowGeometry.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        flowGeometry.setAttribute('color', new THREE.BufferAttribute(flowColors, 3));

        const flowMaterial = new THREE.PointsMaterial({
            size: 0.3,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.7,
            map: particleTexture
        });

        const flowParticles = new THREE.Points(flowGeometry, flowMaterial);
        scene.add(flowParticles);

        // 动画循环
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // 更新爱心粒子 - 呼吸效果
            const heartPosAttr = heartGeometry.attributes.position;
            const heartPosArray = heartPosAttr.array;

            for (let i = 0; i < heartParticleCount; i++) {
                const idx = i * 3;
                const phase = heartPhases[i];

                // 呼吸效果 - 粒子在原始位置附近轻微移动
                const breathe = Math.sin(time * 2 + phase) * 0.15;
                const breatheX = Math.cos(phase) * breathe;
                const breatheY = Math.sin(phase) * breathe;
                const breatheZ = Math.cos(phase * 0.5) * breathe;

                heartPosArray[idx] = heartOriginalPositions[idx] + breatheX;
                heartPosArray[idx + 1] = heartOriginalPositions[idx + 1] + breatheY;
                heartPosArray[idx + 2] = heartOriginalPositions[idx + 2] + breatheZ;
            }

            heartPosAttr.needsUpdate = true;

            // 爱心整体轻微脉动
            const heartPulse = 1 + Math.sin(time * 1.5) * 0.02;
            heartParticles.scale.set(heartPulse, heartPulse, heartPulse);

            // 更新流动粒子
            const flowPosAttr = flowGeometry.attributes.position;
            const flowPosArray = flowPosAttr.array;

            for (let i = 0; i < flowParticleCount; i++) {
                const idx = i * 3;

                // 更新进度
                flowProgress[i] += flowSpeeds[i];

                if (flowProgress[i] >= 1) {
                    // 到达目标，重置到新的外部位置
                    flowProgress[i] = 0;

                    const angle = Math.random() * Math.PI * 2;
                    const radius = 15 + Math.random() * 10;
                    const height = (Math.random() - 0.5) * 20;

                    flowPosArray[idx] = Math.cos(angle) * radius;
                    flowPosArray[idx + 1] = height;
                    flowPosArray[idx + 2] = Math.sin(angle) * radius;

                    // 新的目标
                    const target = getRandomHeartPoint();
                    flowTargets[idx] = target.x;
                    flowTargets[idx + 1] = target.y;
                    flowTargets[idx + 2] = target.z;
                } else {
                    // 插值移动
                    const t = flowProgress[i];
                    // 使用缓动函数
                    const easeT = t * t * (3 - 2 * t);

                    const startX = flowPosArray[idx];
                    const startY = flowPosArray[idx + 1];
                    const startZ = flowPosArray[idx + 2];

                    // 简单的线性插值，从当前位置向目标移动
                    flowPosArray[idx] = startX + (flowTargets[idx] - startX) * 0.02;
                    flowPosArray[idx + 1] = startY + (flowTargets[idx + 1] - startY) * 0.02;
                    flowPosArray[idx + 2] = startZ + (flowTargets[idx + 2] - startZ) * 0.02;
                }
            }

            flowPosAttr.needsUpdate = true;

            // 更新控制器
            controls.update();

            // 渲染
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
