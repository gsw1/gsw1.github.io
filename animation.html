<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>爱心粒子效果</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 粒子类
        class Particle {
            constructor(x, y, size, speedX, speedY, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
                this.color = color;
                this.opacity = Math.random() * 0.5 + 0.5;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // 边界检查
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // 生成爱心形状的粒子
        const particles = [];
        const particleCount = 1000;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = Math.min(canvas.width, canvas.height) / 20;
        
        // 爱心公式参数方程
        function heartX(t) {
            return 16 * Math.pow(Math.sin(t), 3);
        }
        
        function heartY(t) {
            return -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        }
        
        // 创建爱心粒子
        for (let i = 0; i < particleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.random();
            
            // 使用爱心公式
            let x = heartX(t);
            let y = heartY(t);
            
            // 添加随机偏移，使粒子分布更自然
            x += (Math.random() - 0.5) * 4;
            y += (Math.random() - 0.5) * 4;
            
            // 缩放并居中
            x = centerX + x * scale * 0.15;
            y = centerY + y * scale * 0.15;
            
            // 随机大小
            const size = Math.random() * 3 + 1;
            
            // 随机速度（轻微浮动）
            const speedX = (Math.random() - 0.5) * 0.5;
            const speedY = (Math.random() - 0.5) * 0.5;
            
            // 粉色系颜色
            const colors = ['#FF69B4', '#FF1493', '#FF6B9D', '#FFB6C1', '#FFC0CB', '#FF85A2'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            particles.push(new Particle(x, y, size, speedX, speedY, color));
        }
        
        // 动画循环
        let angle = 0;
        function animate() {
            // 创建拖尾效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新和绘制粒子
            particles.forEach((particle, index) => {
                // 添加旋转效果
                const dx = particle.x - centerX;
                const dy = particle.y - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 围绕中心旋转
                const rotateSpeed = 0.002;
                const cos = Math.cos(rotateSpeed);
                const sin = Math.sin(rotateSpeed);
                
                const newX = centerX + (dx * cos - dy * sin);
                const newY = centerY + (dx * sin + dy * cos);
                
                particle.x = newX;
                particle.y = newY;
                
                // 添加脉动效果
                const pulse = Math.sin(Date.now() * 0.002 + index * 0.1) * 0.5 + 0.5;
                particle.size = (Math.random() * 2 + 1) * (1 + pulse * 0.3);
                
                particle.draw();
            });
            
            // 绘制中心发光效果
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
            gradient.addColorStop(0, 'rgba(255, 105, 180, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 105, 180, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
            ctx.fill();
            
            requestAnimationFrame(animate);
        }
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 重新计算中心点
            const newCenterX = canvas.width / 2;
            const newCenterY = canvas.height / 2;
            const newScale = Math.min(canvas.width, canvas.height) / 20;
            
            // 更新粒子位置
            particles.forEach((particle, index) => {
                const t = (index / particleCount) * Math.PI * 2;
                let x = heartX(t);
                let y = heartY(t);
                x += (Math.random() - 0.5) * 4;
                y += (Math.random() - 0.5) * 4;
                particle.x = newCenterX + x * newScale * 0.15;
                particle.y = newCenterY + y * newScale * 0.15;
            });
        });
        
        animate();
    </script>
</body>
</html>
