<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D爱心粒子效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 5, 30);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.2;

        // 创建圆形纹理
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(0.7, 'rgba(255,255,255,0.3)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const particleTexture = new THREE.CanvasTexture(canvas);

        // 爱心主体粒子系统
        const heartParticleCount = 8000;
        const heartGeometry = new THREE.BufferGeometry();
        const heartPositions = new Float32Array(heartParticleCount * 3);
        const heartOriginalPositions = new Float32Array(heartParticleCount * 3);
        const heartColors = new Float32Array(heartParticleCount * 3);
        const heartPhases = new Float32Array(heartParticleCount);
        const heartAmplitudes = new Float32Array(heartParticleCount);

        // 生成爱心表面点
        function getHeartPoint(u, scale = 1) {
            // 经典2D爱心参数方程
            const x = 16 * Math.pow(Math.sin(u), 3);
            const y = 13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u);
            return {
                x: x * scale * 0.12,
                y: y * scale * 0.12,
                z: 0
            };
        }

        // 生成3D爱心粒子
        for (let i = 0; i < heartParticleCount; i++) {
            const idx = i * 3;
            
            // 在爱心表面均匀分布
            const u = (i / heartParticleCount) * Math.PI * 2 + Math.random() * 0.1;
            
            // 多层厚度
            const layer = Math.random();
            let scale, depth;
            if (layer < 0.3) {
                scale = 0.9;
                depth = (Math.random() - 0.5) * 1.5;
            } else if (layer < 0.7) {
                scale = 1.0;
                depth = (Math.random() - 0.5) * 2.0;
            } else {
                scale = 1.1;
                depth = (Math.random() - 0.5) * 1.5;
            }
            
            const pos = getHeartPoint(u, scale);
            pos.z = depth;
            
            // 添加表面随机性
            pos.x += (Math.random() - 0.5) * 0.4;
            pos.y += (Math.random() - 0.5) * 0.4;
            pos.z += (Math.random() - 0.5) * 0.4;
            
            heartPositions[idx] = pos.x;
            heartPositions[idx + 1] = pos.y + 3; // 抬高一点
            heartPositions[idx + 2] = pos.z;
            
            heartOriginalPositions[idx] = pos.x;
            heartOriginalPositions[idx + 1] = pos.y + 3;
            heartOriginalPositions[idx + 2] = pos.z;
            
            // 动画参数
            heartPhases[i] = Math.random() * Math.PI * 2;
            heartAmplitudes[i] = 0.1 + Math.random() * 0.3;
            
            // 粉色系颜色 - 根据位置变化
            const normalizedY = (pos.y + 15) / 30;
            const depthFactor = Math.abs(pos.z) / 2;
            
            // 亮粉色为主
            const pinkIntensity = 0.8 + Math.random() * 0.2;
            heartColors[idx] = pinkIntensity;
            heartColors[idx + 1] = 0.2 + normalizedY * 0.3 + depthFactor * 0.1;
            heartColors[idx + 2] = 0.5 + normalizedY * 0.3 + (1 - depthFactor) * 0.2;
        }

        heartGeometry.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
        heartGeometry.setAttribute('color', new THREE.BufferAttribute(heartColors, 3));

        const heartMaterial = new THREE.PointsMaterial({
            size: 0.35,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.85,
            map: particleTexture
        });

        const heartParticles = new THREE.Points(heartGeometry, heartMaterial);
        scene.add(heartParticles);

        // 飘落粒子系统 - 从爱心边缘飘落
        const fallingParticleCount = 2000;
        const fallingGeometry = new THREE.BufferGeometry();
        const fallingPositions = new Float32Array(fallingParticleCount * 3);
        const fallingVelocities = new Float32Array(fallingParticleCount * 3);
        const fallingColors = new Float32Array(fallingParticleCount * 3);
        const fallingLife = new Float32Array(fallingParticleCount);

        function resetFallingParticle(i) {
            const idx = i * 3;
            
            // 从爱心边缘生成
            const u = Math.random() * Math.PI * 2;
            const scale = 0.9 + Math.random() * 0.3;
            const pos = getHeartPoint(u, scale);
            
            // 在爱心底部边缘生成更多
            if (Math.random() > 0.3) {
                // 偏向底部
                const bottomU = Math.PI + (Math.random() - 0.5) * 2;
                const bottomPos = getHeartPoint(bottomU, scale);
                fallingPositions[idx] = bottomPos.x + (Math.random() - 0.5) * 2;
                fallingPositions[idx + 1] = bottomPos.y + 2;
                fallingPositions[idx + 2] = bottomPos.z + (Math.random() - 0.5) * 2;
            } else {
                fallingPositions[idx] = pos.x + (Math.random() - 0.5) * 1.5;
                fallingPositions[idx + 1] = pos.y + 3;
                fallingPositions[idx + 2] = pos.z + (Math.random() - 0.5) * 1.5;
            }
            
            // 飘落速度 - 向下且带飘动
            fallingVelocities[idx] = (Math.random() - 0.5) * 0.03;
            fallingVelocities[idx + 1] = -Math.random() * 0.05 - 0.02;
            fallingVelocities[idx + 2] = (Math.random() - 0.5) * 0.03;
            
            // 生命周期
            fallingLife[i] = 1.0;
            
            // 淡粉色
            const brightness = 0.7 + Math.random() * 0.3;
            fallingColors[idx] = brightness;
            fallingColors[idx + 1] = brightness * 0.5;
            fallingColors[idx + 2] = brightness * 0.7;
        }

        // 初始化飘落粒子
        for (let i = 0; i < fallingParticleCount; i++) {
            resetFallingParticle(i);
            // 随机初始生命周期
            fallingLife[i] = Math.random();
        }

        fallingGeometry.setAttribute('position', new THREE.BufferAttribute(fallingPositions, 3));
        fallingGeometry.setAttribute('color', new THREE.BufferAttribute(fallingColors, 3));

        const fallingMaterial = new THREE.PointsMaterial({
            size: 0.25,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.6,
            map: particleTexture
        });

        const fallingParticles = new THREE.Points(fallingGeometry, fallingMaterial);
        scene.add(fallingParticles);

        // 地面散落粒子
        const groundParticleCount = 3000;
        const groundGeometry = new THREE.BufferGeometry();
        const groundPositions = new Float32Array(groundParticleCount * 3);
        const groundColors = new Float32Array(groundParticleCount * 3);

        for (let i = 0; i < groundParticleCount; i++) {
            const idx = i * 3;
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 15;
            
            groundPositions[idx] = Math.cos(angle) * radius;
            groundPositions[idx + 1] = -8 + Math.random() * 2;
            groundPositions[idx + 2] = Math.sin(angle) * radius;
            
            // 淡粉白色
            const brightness = 0.5 + Math.random() * 0.4;
            groundColors[idx] = brightness;
            groundColors[idx + 1] = brightness * 0.6;
            groundColors[idx + 2] = brightness * 0.8;
        }

        groundGeometry.setAttribute('position', new THREE.BufferAttribute(groundPositions, 3));
        groundGeometry.setAttribute('color', new THREE.BufferAttribute(groundColors, 3));

        const groundMaterial = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.35,
            map: particleTexture
        });

        const groundParticles = new THREE.Points(groundGeometry, groundMaterial);
        scene.add(groundParticles);

        // 动画循环
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // 更新爱心粒子 - 风吹动效果
            const heartPosAttr = heartGeometry.attributes.position;
            const heartPosArray = heartPosAttr.array;

            for (let i = 0; i < heartParticleCount; i++) {
                const idx = i * 3;
                const phase = heartPhases[i];
                const amplitude = heartAmplitudes[i];

                // 风吹动效果 - 多个方向的波动
                const windX = Math.sin(time * 1.5 + phase) * amplitude * 0.3;
                const windY = Math.cos(time * 1.2 + phase * 0.8) * amplitude * 0.2;
                const windZ = Math.sin(time * 0.8 + phase * 1.2) * amplitude * 0.4;

                // 根据位置添加不同的波动
                const yFactor = (heartOriginalPositions[idx + 1] + 10) / 20;
                const xFactor = heartOriginalPositions[idx] / 10;

                heartPosArray[idx] = heartOriginalPositions[idx] + windX * (1 + yFactor);
                heartPosArray[idx + 1] = heartOriginalPositions[idx + 1] + windY;
                heartPosArray[idx + 2] = heartOriginalPositions[idx + 2] + windZ * (1 + Math.abs(xFactor));
            }

            heartPosAttr.needsUpdate = true;

            // 爱心整体轻微脉动
            const heartPulse = 1 + Math.sin(time * 0.8) * 0.015;
            heartParticles.scale.set(heartPulse, heartPulse, heartPulse);

            // 更新飘落粒子
            const fallingPosAttr = fallingGeometry.attributes.position;
            const fallingPosArray = fallingPosAttr.array;

            for (let i = 0; i < fallingParticleCount; i++) {
                const idx = i * 3;

                // 应用速度
                fallingPosArray[idx] += fallingVelocities[idx];
                fallingPosArray[idx + 1] += fallingVelocities[idx + 1];
                fallingPosArray[idx + 2] += fallingVelocities[idx + 2];

                // 添加飘动
                fallingPosArray[idx] += Math.sin(time * 2 + i * 0.1) * 0.01;
                fallingPosArray[idx + 2] += Math.cos(time * 1.5 + i * 0.1) * 0.01;

                // 减少生命周期
                fallingLife[i] -= 0.005;

                // 重置或消失
                if (fallingPosArray[idx + 1] < -8 || fallingLife[i] <= 0) {
                    resetFallingParticle(i);
                }
            }

            fallingPosAttr.needsUpdate = true;

            // 更新控制器
            controls.update();

            // 渲染
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
