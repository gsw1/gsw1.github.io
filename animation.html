<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>循环粒子动画手机版</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;}
.back-btn{position:fixed;top:15px;left:15px;z-index:100;padding:8px 16px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:20px;text-decoration:none;font-size:14px;backdrop-filter:blur(5px);transition:all 0.3s;}
.back-btn:hover{background:rgba(255,255,255,0.3);transform:scale(1.05);}
</style>
</head>
<body>
<a href="index.html" class="back-btn">← 返回</a>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ===== Scene & Camera =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ===== Composer + Bloom =====
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 3.0, 0.4, 0.85));

// ===== Particle Setup =====
const particleCount = 15000; // 手机优化点数少一些
const positions = new Float32Array(particleCount*3);
const offsets = new Float32Array(particleCount);

// 初始散开
for(let i=0;i<particleCount;i++){
  const r = 50 + Math.random()*20;
  const angle = Math.random()*Math.PI*2;
  positions[i*3] = Math.cos(angle)*r;
  positions[i*3+1] = (Math.random()-0.5)*60;
  positions[i*3+2] = Math.sin(angle)*r;
  offsets[i] = Math.random()*100;
}

// ===== Heart Points =====
function heart(x,y){const a=x*x+y*y-1; return a*a*a-x*x*y*y*y<=0;}
function createHeartPoints(){
  const pts = [];
  for(let t=0;t<Math.PI*2;t+=0.01){
    const x = 16*Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    pts.push(new THREE.Vector3(x*0.6,y*0.6,0));
  }
  for(let x=-1.5;x<=1.5;x+=0.06){
    for(let y=-1.5;y<=1.5;y+=0.06){
      if(heart(x,y)) pts.push(new THREE.Vector3(x*12,y*12,(Math.random()-0.5)*2));
    }
  }
  return pts;
}

// ===== Text Points (竖屏优化) =====
function createTextPoints(text){
  const isPortrait = window.innerWidth < window.innerHeight;
  const canvas = document.createElement('canvas');
  
  // 竖屏：使用更窄的宽度和更大的高度，文字纵向排列
  if (isPortrait) {
    canvas.width = 400;
    canvas.height = 600;
  } else {
    canvas.width = 800;
    canvas.height = 300;
  }
  
  const ctx = canvas.getContext('2d');
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#fff";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  
  // 竖屏时文字纵向排列，横屏时横向排列
  if (isPortrait && text.length > 1) {
    // 竖屏：每个字占一行，从上到下排列
    const fontSize = 100;
    ctx.font = `bold ${fontSize}px PingFang SC, Microsoft YaHei`;
    const lineHeight = 140;
    const startY = canvas.height/2 - (text.length-1)*lineHeight/2;
    for (let i = 0; i < text.length; i++) {
      ctx.fillText(text[i], canvas.width/2, startY + i*lineHeight);
    }
  } else {
    // 横屏：横向排列
    const fontSize = isPortrait ? 80 : 100;
    ctx.font = `bold ${fontSize}px PingFang SC, Microsoft YaHei`;
    ctx.fillText(text, canvas.width/2, canvas.height/2);
  }
  
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const pts = [];
  const step = 2;
  const scale = isPortrait ? 0.08 : 0.12; // 竖屏缩放比例更小
  
  for(let y=0; y<canvas.height; y+=step){
    for(let x=0; x<canvas.width; x+=step){
      if(img.data[(y*canvas.width+x)*4]>200){
        pts.push(new THREE.Vector3(
          (x-canvas.width/2)*scale,
          (canvas.height/2-y)*scale,
          (Math.random()-0.5)*2
        ));
      }
    }
  }
  return pts;
}

// ===== Targets =====
const targets = [
  createHeartPoints(),
  createTextPoints("颜颜"),
  createTextPoints("我爱你")
];
let targetIndex = 0;

// ===== Geometry & Shader =====
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
geo.setAttribute('aOffset', new THREE.BufferAttribute(offsets,1));

const material = new THREE.ShaderMaterial({
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false,
  uniforms:{ uTime:{value:0} },
  vertexShader:`
    attribute float aOffset;
    uniform float uTime;
    void main(){
      vec3 p=position;
      float t = uTime*0.5+aOffset;
      p.x += sin(t)*0.2;
      p.y += cos(t*1.2)*0.2;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
      gl_PointSize = 2.0;
    }
  `,
  fragmentShader:`
    void main(){
      float d = length(gl_PointCoord-vec2(0.5));
      float alpha = smoothstep(0.5,0.0,d);
      gl_FragColor=vec4(1.0,0.6,0.9,alpha);
    }
  `
});
const particles = new THREE.Points(geo, material);
scene.add(particles);

// ===== State Machine =====
let state="gather"; 
let progress=0;

// ===== Click/Touch Handler =====
function handleInteraction(e){
  if(e.target.closest('.back-btn')) return; // 排除返回按钮
  if(state==="heart" || state==="text") state="explode";
}

// 同时支持鼠标点击和触摸
window.addEventListener('click', handleInteraction);
window.addEventListener('touchstart', (e)=>{
  e.preventDefault(); // 防止触摸延迟
  handleInteraction(e);
}, {passive: false});

// ===== Animate =====
function animate(){
  requestAnimationFrame(animate);
  const arr=geo.attributes.position.array;
  material.uniforms.uTime.value+=0.02;

  if(state==="gather"){
    progress+=0.01;
    const t = targets[targetIndex%targets.length];
    for(let i=0;i<particleCount;i++){
      const pt=t[i%t.length];
      arr[i*3] += (pt.x - arr[i*3])*0.04;
      arr[i*3+1] += (pt.y - arr[i*3+1])*0.04;
      arr[i*3+2] += (pt.z - arr[i*3+2])*0.04;
    }
    if(progress>1){ 
      state = targetIndex===0 ? "heart" : "text"; 
      progress=0; 
    }
  }
  else if(state==="heart" || state==="text"){
    const s = 1 + Math.sin(Date.now()*0.002)*0.03;
    particles.scale.set(s,s,s);
  }
  else if(state==="explode"){
    progress+=0.02;
    for(let i=0;i<particleCount;i++){
      arr[i*3]+=(Math.random()-0.5)*4;
      arr[i*3+1]+=(Math.random()-0.5)*4;
      arr[i*3+2]+=(Math.random()-0.5)*4;
    }
    if(progress>1){
      targetIndex=(targetIndex+1)%targets.length;
      state="gather";
      progress=0;
    }
  }

  geo.attributes.position.needsUpdate=true;
  composer.render();
}
animate();

// ===== Resize =====
window.onresize = ()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
};
</script>
</body>
</html>
