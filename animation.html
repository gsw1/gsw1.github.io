<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D爱心粒子效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 30);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // 粒子系统
        const particleCount = 10000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const originalY = new Float32Array(particleCount);

        // 改进的爱心形状函数 - 使用3D球坐标
        function getHeartPosition(i, total) {
            // 使用黄金角度分布，让粒子均匀分布
            const phi = Math.acos(1 - 2 * (i + 0.5) / total);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            
            // 转换为笛卡尔坐标
            let x = Math.sin(phi) * Math.cos(theta);
            let y = Math.sin(phi) * Math.sin(theta);
            let z = Math.cos(phi);
            
            // 应用爱心形状变形
            // 爱心公式: (x^2 + 9/4y^2 + z^2 - 1)^3 - x^2z^3 - 9/80y^2z^3 = 0
            const r = 1;
            const scale = 8;
            
            // 使用参数方程生成爱心表面点
            const u = theta;
            const v = phi;
            
            // 3D爱心参数方程
            const heartX = scale * Math.sin(v) * Math.pow(Math.sin(u), 3);
            const heartY = scale * (13 * Math.cos(v) - 5 * Math.cos(2*v) - 2 * Math.cos(3*v) - Math.cos(4*v)) / 16;
            const heartZ = scale * Math.cos(v) * Math.sin(u);
            
            return {
                x: heartX,
                y: heartY,
                z: heartZ
            };
        }

        // 生成爱心粒子
        for (let i = 0; i < particleCount; i++) {
            const idx = i * 3;
            
            // 使用改进的爱心形状生成
            const u = Math.random() * Math.PI * 2;
            const v = Math.acos(2 * Math.random() - 1);
            
            // 3D爱心表面参数方程
            const scale = 6;
            const thickness = (Math.random() - 0.5) * 2; // 添加厚度
            
            // 基础爱心形状
            let x = scale * 16 * Math.pow(Math.sin(u), 3) / 16;
            let y = scale * (13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u)) / 16;
            let z = scale * Math.sin(v) * Math.cos(u) * 0.5 + thickness;
            
            // 添加随机偏移使粒子分布更自然
            x += (Math.random() - 0.5) * 0.8;
            y += (Math.random() - 0.5) * 0.8;
            z += (Math.random() - 0.5) * 0.8;
            
            positions[idx] = x;
            positions[idx + 1] = y + 5; // 抬高位置
            positions[idx + 2] = z;
            
            // 保存原始Y位置用于重置
            originalY[i] = y + 5;
            
            // 初始速度（向下飘落）
            velocities[idx] = (Math.random() - 0.5) * 0.03;
            velocities[idx + 1] = -Math.random() * 0.08 - 0.03;
            velocities[idx + 2] = (Math.random() - 0.5) * 0.03;
            
            // 根据Y位置设置颜色渐变
            const normalizedY = (y + 10) / 20; // 归一化到0-1
            
            // 粉色系渐变
            if (normalizedY > 0.7) {
                // 顶部 - 亮粉色
                colors[idx] = 1.0;
                colors[idx + 1] = 0.4 + Math.random() * 0.3;
                colors[idx + 2] = 0.7 + Math.random() * 0.2;
            } else if (normalizedY > 0.4) {
                // 中部 - 中粉色
                colors[idx] = 1.0;
                colors[idx + 1] = 0.2 + Math.random() * 0.3;
                colors[idx + 2] = 0.5 + Math.random() * 0.2;
            } else {
                // 底部 - 深粉色/紫粉色
                colors[idx] = 0.9 + Math.random() * 0.1;
                colors[idx + 1] = 0.1 + Math.random() * 0.2;
                colors[idx + 2] = 0.4 + Math.random() * 0.3;
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // 创建粒子材质 - 使用圆形纹理
        const sprite = new THREE.TextureLoader().load('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTYiIGZpbGw9IndoaXRlIi8+PC9zdmc+');
        
        const material = new THREE.PointsMaterial({
            size: 0.4,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.9,
            map: sprite
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 地面粒子（散落的粒子）
        const groundParticleCount = 5000;
        const groundGeometry = new THREE.BufferGeometry();
        const groundPositions = new Float32Array(groundParticleCount * 3);
        const groundColors = new Float32Array(groundParticleCount * 3);

        for (let i = 0; i < groundParticleCount; i++) {
            const idx = i * 3;
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 20;
            
            groundPositions[idx] = Math.cos(angle) * radius;
            groundPositions[idx + 1] = -10 + Math.random() * 3;
            groundPositions[idx + 2] = Math.sin(angle) * radius;
            
            // 地面粒子颜色（淡粉/白色）
            const brightness = 0.5 + Math.random() * 0.5;
            groundColors[idx] = brightness;
            groundColors[idx + 1] = brightness * 0.6;
            groundColors[idx + 2] = brightness * 0.8;
        }

        groundGeometry.setAttribute('position', new THREE.BufferAttribute(groundPositions, 3));
        groundGeometry.setAttribute('color', new THREE.BufferAttribute(groundColors, 3));

        const groundMaterial = new THREE.PointsMaterial({
            size: 0.2,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.4,
            map: sprite
        });

        const groundParticles = new THREE.Points(groundGeometry, groundMaterial);
        scene.add(groundParticles);

        // 动画循环
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            
            // 更新爱心粒子
            const posAttribute = geometry.attributes.position;
            const posArray = posAttribute.array;
            
            for (let i = 0; i < particleCount; i++) {
                const idx = i * 3;
                
                // 应用速度
                posArray[idx] += velocities[idx];
                posArray[idx + 1] += velocities[idx + 1];
                posArray[idx + 2] += velocities[idx + 2];
                
                // 添加飘动效果
                posArray[idx] += Math.sin(time * 1.5 + i * 0.01) * 0.01;
                posArray[idx + 2] += Math.cos(time * 1.2 + i * 0.01) * 0.01;
                
                // 地面碰撞检测
                if (posArray[idx + 1] < -10) {
                    // 重置到爱心顶部位置
                    const u = Math.random() * Math.PI * 2;
                    const scale = 6;
                    
                    posArray[idx] = scale * 16 * Math.pow(Math.sin(u), 3) / 16 + (Math.random() - 0.5) * 0.8;
                    posArray[idx + 1] = scale * (13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u)) / 16 + 8;
                    posArray[idx + 2] = (Math.random() - 0.5) * 2;
                    
                    // 重置速度
                    velocities[idx] = (Math.random() - 0.5) * 0.03;
                    velocities[idx + 1] = -Math.random() * 0.08 - 0.03;
                    velocities[idx + 2] = (Math.random() - 0.5) * 0.03;
                }
            }
            
            posAttribute.needsUpdate = true;
            
            // 爱心整体轻微脉动和旋转
            const pulse = 1 + Math.sin(time * 0.8) * 0.03;
            particles.scale.set(pulse, pulse, pulse);
            particles.rotation.y = time * 0.1;
            
            // 更新控制器
            controls.update();
            
            // 渲染
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
