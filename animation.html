<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D爱心粒子效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 5, 20);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // 粒子系统
        const particleCount = 8000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const originalPositions = new Float32Array(particleCount * 3);

        // 爱心形状函数
        function getHeartPosition(t, scale = 1) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            const z = (Math.random() - 0.5) * 4;
            return {
                x: x * scale * 0.15,
                y: y * scale * 0.15,
                z: z * scale * 0.15
            };
        }

        // 生成爱心粒子
        for (let i = 0; i < particleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const layer = Math.random();
            const scale = 0.5 + layer * 0.8;
            
            const pos = getHeartPosition(t, scale);
            
            // 添加一些随机偏移
            pos.x += (Math.random() - 0.5) * 1.5;
            pos.y += (Math.random() - 0.5) * 1.5;
            pos.z += (Math.random() - 0.5) * 1.5;
            
            const idx = i * 3;
            positions[idx] = pos.x;
            positions[idx + 1] = pos.y + 8; // 抬高爱心位置
            positions[idx + 2] = pos.z;
            
            // 保存原始位置
            originalPositions[idx] = pos.x;
            originalPositions[idx + 1] = pos.y + 8;
            originalPositions[idx + 2] = pos.z;
            
            // 初始速度（向下飘落）
            velocities[idx] = (Math.random() - 0.5) * 0.02;
            velocities[idx + 1] = -Math.random() * 0.05 - 0.02;
            velocities[idx + 2] = (Math.random() - 0.5) * 0.02;
            
            // 粉色系颜色
            const colorVariation = Math.random();
            if (colorVariation < 0.3) {
                // 深粉色
                colors[idx] = 1.0;
                colors[idx + 1] = 0.2;
                colors[idx + 2] = 0.6;
            } else if (colorVariation < 0.6) {
                // 中粉色
                colors[idx] = 1.0;
                colors[idx + 1] = 0.4;
                colors[idx + 2] = 0.7;
            } else if (colorVariation < 0.85) {
                // 浅粉色
                colors[idx] = 1.0;
                colors[idx + 1] = 0.6;
                colors[idx + 2] = 0.8;
            } else {
                // 紫粉色
                colors[idx] = 0.9;
                colors[idx + 1] = 0.4;
                colors[idx + 2] = 0.9;
            }
            
            // 粒子大小
            sizes[i] = Math.random() * 0.15 + 0.05;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // 创建粒子材质
        const material = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.8
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 地面粒子（散落的粒子）
        const groundParticleCount = 3000;
        const groundGeometry = new THREE.BufferGeometry();
        const groundPositions = new Float32Array(groundParticleCount * 3);
        const groundColors = new Float32Array(groundParticleCount * 3);

        for (let i = 0; i < groundParticleCount; i++) {
            const idx = i * 3;
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 15;
            
            groundPositions[idx] = Math.cos(angle) * radius;
            groundPositions[idx + 1] = -8 + Math.random() * 2;
            groundPositions[idx + 2] = Math.sin(angle) * radius;
            
            // 地面粒子颜色（偏白/淡粉）
            const brightness = 0.6 + Math.random() * 0.4;
            groundColors[idx] = brightness;
            groundColors[idx + 1] = brightness * 0.7;
            groundColors[idx + 2] = brightness * 0.9;
        }

        groundGeometry.setAttribute('position', new THREE.BufferAttribute(groundPositions, 3));
        groundGeometry.setAttribute('color', new THREE.BufferAttribute(groundColors, 3));

        const groundMaterial = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.5
        });

        const groundParticles = new THREE.Points(groundGeometry, groundMaterial);
        scene.add(groundParticles);

        // 动画变量
        const clock = new THREE.Clock();
        const tempPositions = new Float32Array(particleCount * 3);

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();
            
            // 更新爱心粒子
            const posAttribute = geometry.attributes.position;
            const positions = posAttribute.array;
            
            for (let i = 0; i < particleCount; i++) {
                const idx = i * 3;
                
                // 应用速度
                positions[idx] += velocities[idx];
                positions[idx + 1] += velocities[idx + 1];
                positions[idx + 2] += velocities[idx + 2];
                
                // 添加轻微摆动
                positions[idx] += Math.sin(time * 2 + i * 0.1) * 0.005;
                positions[idx + 2] += Math.cos(time * 1.5 + i * 0.1) * 0.005;
                
                // 地面碰撞检测
                if (positions[idx + 1] < -8) {
                    // 重置到爱心位置
                    const t = Math.random() * Math.PI * 2;
                    const scale = 0.5 + Math.random() * 0.8;
                    const pos = getHeartPosition(t, scale);
                    
                    positions[idx] = pos.x + (Math.random() - 0.5) * 1.5;
                    positions[idx + 1] = pos.y + 10;
                    positions[idx + 2] = pos.z + (Math.random() - 0.5) * 1.5;
                    
                    // 重置速度
                    velocities[idx] = (Math.random() - 0.5) * 0.02;
                    velocities[idx + 1] = -Math.random() * 0.05 - 0.02;
                    velocities[idx + 2] = (Math.random() - 0.5) * 0.02;
                }
            }
            
            posAttribute.needsUpdate = true;
            
            // 爱心整体轻微脉动
            const pulse = 1 + Math.sin(time * 0.5) * 0.02;
            particles.scale.set(pulse, pulse, pulse);
            
            // 更新控制器
            controls.update();
            
            // 渲染
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
